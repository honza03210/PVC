<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yappr</title>
    <script type="module" src="/src/main.ts"></script>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
<div id="container">
    <table class="main-menu-table">
        <tr>
            <td>
                <div id="rooms-list-menu" class="menu menu-padding flex-column">
                        <label for="roomID">Rooms</label>
                    <div id="rooms-list" class="menu flex-column fill-height align-top">

                    </div>
                </div>
            </td>
            <td>
                <div id="main-menu" class="menu menu-padding center-div flex-column">
                <div id="audio-menu" class="menu menu-padding center-div flex-column rounded" style="display: none">
                    <canvas id="localVisualization"></canvas>
                    <audio id="localAudio" autoplay muted></audio>
                </div>
                <div style="display: flex; flex-direction: column">
                        <label for="name">Username</label><input type="text" id="name"/>
                        <label for="roomID">Room Name</label><input type="text" id="roomID"/>
                        <label for="password">Password</label><input type="password" id="password"/>
                        <div id="errorMsg"></div>
                        <button id="3DInitButton" class="menu-button hidden">3D View</button>
                        <button id="downloadStatsButton" class="menu-button">Download Statistics</button>
                        <button id="initButton" class="menu-button">Initialize</button>
                        <button id="joinRoomButton" class="menu-button hidden">Join</button>
                        <button id="leaveRoomButton" class="menu-button hidden">Leave</button>
                    </div>
                </div>
            </td>
            <td>
            </td>
        </tr>
    </table>
    <table class="peer-container-table">
        <tr>
            <td></td>
            <td>
                <div id="peerContainerMenu" class="menu menu-padding center-div flex-column">
                    <div id="peerContainer" class="center-div flex-row" style="width: 100%"></div>
                </div>
            </td>
            <td></td>
        </tr>
    </table>
</div>
</body>
</html>
